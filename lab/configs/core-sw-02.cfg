hostname core-sw-02
!
service routing protocols model multi-agent
!
vlan 10
   name users
!
vlan 20
   name voice
!
interface Ethernet1
   no switchport
   ip address 10.0.0.2/30
!
interface Ethernet2
   switchport
   switchport mode access
   switchport access vlan 10
!
interface Ethernet3
   switchport
   switchport mode trunk
   switchport trunk allowed vlan 10,20
!
end