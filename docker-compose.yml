# docker-compose.yml — runs the whole netdrift stack (v0.2).
#
# Three services on one network:
#   postgres  — the database (official image)
#   api       — the FastAPI app (uvicorn), built from our Dockerfile
#   scheduler — the polling loop, same image, different command
#
# Bring it all up with:   docker compose up
# (add --build the first time, or after changing the Dockerfile/code)
#
# NOTE: api and scheduler reach Postgres at host "postgres" (the service name),
# NOT "localhost" — inside the compose network each service is reachable by its
# service name. That is why DATABASE_URL below points at @postgres, not
# @localhost.
#
# Port choice: the API publishes on host port 8001 (not 8000) because NetBox
# — the user's source-of-truth, which this tool reads from — conventionally
# runs on host port 8000. Co-locating netdrift's API on 8000 collides on any
# host that already runs NetBox locally. 8001 keeps the "+1 from NetBox"
# convention obvious without inventing a random port.
#
# devices.yml: src/netdrift/cli.py computes DEVICES_FILE as
#   Path(__file__).resolve().parents[2] / "devices.yml"
# which, inside the container, resolves to /usr/local/lib/python3.11/devices.yml
# (the package is installed there by `pip install .` in the Dockerfile). Both
# api and scheduler need that file to exist at that exact path; we bind-mount
# the host's ./devices.yml in, read-only. The host file is gitignored and
# must never be committed (it holds credentials).
#
# NETBOX_URL / NETBOX_TOKEN: the scheduler must reach NetBox to read intent.
# NetBox runs on the HOST at localhost:8000 — but "localhost" inside a
# container means the container itself, not the host. host.docker.internal
# is the bridge name docker provides so a container can reach a service on
# its own host. The api container does not call NetBox today (it only reads
# from Postgres) but we pass the same vars through for symmetry and to
# future-proof endpoints that may need them.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: netdrift
    ports:
      # Expose Postgres on the host too, so you can still connect from the
      # laptop (psql, the smoke tests) at localhost:5432.
      - "5432:5432"
    volumes:
      # Persist the database across `docker compose down`/`up` so drift history
      # is not lost when the stack restarts.
      - netdrift_pgdata:/var/lib/postgresql/data
    healthcheck:
      # api/scheduler wait for this to pass before starting (see depends_on).
      test: ["CMD-SHELL", "pg_isready -U postgres -d netdrift"]
      interval: 5s
      timeout: 5s
      retries: 5
  migrate:
    build: .
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:devpassword@postgres:5432/netdrift
    depends_on:
      postgres:
        condition: service_healthy
  api:
    build: .
    command: uvicorn netdrift.api.app:app --host 0.0.0.0 --port 8001
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:devpassword@postgres:5432/netdrift
      NETBOX_URL: ${NETBOX_URL:-}
      NETBOX_TOKEN: ${NETBOX_TOKEN:-}
    volumes:
      # See top-of-file comment: cli.DEVICES_FILE resolves here inside the
      # container. Read-only because the app never writes to this file.
      - ./devices.yml:/usr/local/lib/python3.11/devices.yml:ro
    ports:
      - "8001:8001"
    extra_hosts:
      # Linux docker doesn't add host.docker.internal by default; this line
      # makes it resolve to the host's gateway IP from inside the container.
      # Required for NetBox-on-host access. Harmless on Docker Desktop where
      # the name already exists.
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
  scheduler:
    build: .
    command: python -m netdrift.scheduler --interval 5
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:devpassword@postgres:5432/netdrift
      NETBOX_URL: ${NETBOX_URL:-}
      NETBOX_TOKEN: ${NETBOX_TOKEN:-}
    volumes:
      - ./devices.yml:/usr/local/lib/python3.11/devices.yml:ro
    ports:
      # Devices send syslog to host port 514 (standard); docker maps it to the
      # internal listener on 1514 (no root required to bind inside the container).
      # Configure lab devices to send syslog to this host on UDP 514.
      - "514:1514/udp"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
volumes:
  netdrift_pgdata: