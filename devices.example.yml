# Device inventory for driftcheck (v0.1 lab scope).
#
# Copy this file to `devices.yml` and fill in real values.
# `devices.yml` is gitignored and must NEVER be committed (it holds credentials).
#
# Each top-level key is a device name. It MUST match the device name in NetBox
# and the value returned by the collector, so intent and reality can be paired.
#
# cEOS lab management IPs are 172.20.20.11 / 172.20.20.12.
# Default cEOS credentials are admin / admin.

core-sw-01:
  hostname: 172.20.20.11
  username: admin
  password: changeme

core-sw-02:
  hostname: 172.20.20.12
  username: admin
  password: changeme
