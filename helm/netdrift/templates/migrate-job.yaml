{{/*
Helm pre-install / pre-upgrade Job — runs `alembic upgrade head` before any
Deployment is created or updated. Helm waits for the Job to succeed before
proceeding, so the API and scheduler never start against an unmigrated schema.

hook-delete-policy: before-hook-creation removes the old Job before each
upgrade so Helm can create a fresh one (Jobs are immutable once created).
hook-succeeded removes it after a successful run to keep the namespace tidy.
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "netdrift.fullname" . }}-migrate
  labels:
    {{- include "netdrift.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        {{- include "netdrift.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: {{ include "netdrift.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "netdrift.fullname" . }}
                  key: DATABASE_URL
