{{/*
Two secrets:
  1. netdrift — holds DATABASE_URL, NETBOX_URL, NETBOX_TOKEN. Consumed by all
     containers via envFrom so every env var is available without listing each
     one individually.
  2. netdrift-devices — holds the devices.yml content, mounted as a file.
     Only created when devicesYaml is non-empty.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "netdrift.fullname" . }}
  labels:
    {{- include "netdrift.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "netdrift.databaseUrl" . | quote }}
  NETBOX_URL: {{ .Values.netbox.url | quote }}
  NETBOX_TOKEN: {{ .Values.netbox.token | quote }}
{{- if .Values.devicesYaml }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "netdrift.fullname" . }}-devices
  labels:
    {{- include "netdrift.labels" . | nindent 4 }}
type: Opaque
stringData:
  devices.yml: {{ .Values.devicesYaml | quote }}
{{- end }}
